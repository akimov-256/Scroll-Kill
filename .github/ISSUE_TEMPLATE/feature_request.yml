name: ✨ Feature request
description: Propose something new that Scroll Kill doesn't do yet
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This extension is intentionally small and single-purpose. That doesn't mean no to new ideas — just be ready to make the case for why it belongs here.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that you currently can't?
      placeholder: Reels also show up in the Explore tab, and right now Scroll Kill only handles the main feed...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature as you imagine it working.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other way to solve this, including workarounds you're currently using?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Where should this apply?
      multiple: true
      options:
        - Main feed
        - Explore tab
        - Search results
        - Profile pages
        - Popup UI
        - Other (explain below)
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Mockups, links, related issues, whatever's useful.
    validations:
      required: false
